<!-- Custom Berkeley Mono approximation using monospace fallback -->
<style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121315;
            color: #e3e2e3;
            overflow: hidden;
        }

        .font-mono-technical {
            font-family: 'JetBrains Mono', monospace;
        }

        .glass-glow {
            background: radial-gradient(circle at 50% 50%, rgba(208, 188, 255, 0.05) 0%, rgba(18, 19, 21, 0) 70%);
        }

        .orb-animation {
            box-shadow: 0 0 40px 10px rgba(160, 120, 255, 0.2);
        }

        .mask-fade {
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }

        .magnetic-physics {
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .bg-mesh {
            background-image: 
                radial-gradient(at 0% 0%, rgba(109, 59, 215, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(208, 188, 255, 0.1) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(18, 19, 21, 1) 0px, transparent 100%);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-tint": "#d0bcff",
                        "background": "#121315",
                        "error": "#ffb4ab",
                        "primary-fixed-dim": "#d0bcff",

</div>

<div class="absolute top-12 left-1/2 -translate-x-1/2 z-50 group cursor-help">

</div>

<span class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></span>
<span class="text-[11px] font-mono-technical tracking-[0.2em] uppercase">Session: Deep Work</span>
</div>
<div class="w-px h-3 bg-outline-variant"></div>
<span class="text-[11px] font-mono-technical tracking-[0.2em] uppercase">Priority: High</span>
</div>
<!-- The Central Focal Point (Timer/Task Name) -->
<div class="flex flex-col items-center text-center">
<h1 class="text-7xl md:text-9xl font-extralight tracking-tighter text-on-surface mb-2 font-headline leading-none">
                            24:59
                        </h1>
<h2 class="text-xl md:text-2xl font-light text-primary/80 tracking-tight font-headline">
                            Architecting Core Data Structures
                        </h2>
</div>
<!-- Hidden Controls (Hover Reveal) -->
<div class="flex items-center gap-4 opacity-0 group-hover:opacity-100 magnetic-physics transform translate-y-4 group-hover:translate-y-0">
<button class="w-12 h-12 rounded-full border border-outline-variant/30 flex items-center justify-center hover:bg-white/5 hover:border-primary/50 transition-all group/btn">
<span class="material-symbols-outlined text-on-surface-variant group-hover/btn:text-primary">pause</span>
</button>
<button class="px-8 py-3 rounded-full bg-gradient-to-r from-primary to-primary-container text-on-primary-container text-sm font-bold tracking-tight shadow-lg shadow-primary/20 hover:scale-105 active:scale-95 transition-all">
                            Complete Task
                        </button>
<button class="w-12 h-12 rounded-full border border-outline-variant/30 flex items-center justify-center hover:bg-white/5 hover:border-primary/50 transition-all group/btn">
<span class="material-symbols-outlined text-on-surface-variant group-hover/btn:text-primary">forward_10</span>
</button>
</div>
</div>

<div class="absolute bottom-0 left-0 w-full h-1 bg-surface-container-highest">
<div class="h-full bg-primary w-2/3 shadow-[0_0_15px_rgba(208,188,255,0.6)]"></div>
</div>
</div>
<!-- Task Detail Expansion (Floating below) -->
<div class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-2xl opacity-60 hover:opacity-100 transition-opacity duration-500">
<div class="p-4 rounded-2xl bg-surface-container-highest/20 border border-white/5 backdrop-blur-md flex flex-col gap-2">
<span class="text-[9px] font-mono-technical uppercase tracking-widest text-outline">Context</span>
<p class="text-xs text-on-surface-variant leading-relaxed">Refining the schema for the obsidian-style fluid interface containers.</p>

<div class="p-4 rounded-2xl bg-surface-container-highest/20 border border-white/5 backdrop-blur-md flex flex-col gap-2">

<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[14px] text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="text-[11px]">Define Types</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[14px] text-outline">radio_button_unchecked</span>
<span class="text-[11px]">Map JSON keys</span>
</div>
</div>
</div>
<div class="p-4 rounded-2xl bg-surface-container-highest/20 border border-white/5 backdrop-blur-md flex flex-col gap-2">
<span class="text-[9px] font-mono-technical uppercase tracking-widest text-outline">Telemetry</span>
<div class="flex items-end gap-1 h-6">
<div class="w-1 bg-primary/40 h-2 rounded-full"></div>
<div class="w-1 bg-primary/60 h-4 rounded-full"></div>
<div class="w-1 bg-primary h-6 rounded-full"></div>
<div class="w-1 bg-primary/70 h-3 rounded-full"></div>
<div class="w-1 bg-primary/50 h-5 rounded-full"></div>
</div>
</div>
</div>
</div>
<!-- System Exit (Bottom Right Corner) -->
<div class="absolute bottom-8 right-8 z-50">
<button class="flex items-center gap-3 px-4 py-2 rounded-lg border border-outline-variant/20 hover:bg-error/10 hover:border-error/30 transition-all text-outline hover:text-error group">
<span class="text-[10px] font-mono-technical uppercase tracking-widest">Terminate Focus</span>
<span class="material-symbols-outlined text-sm">close</span>
